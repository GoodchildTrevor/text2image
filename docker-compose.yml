services:
  imgen:
    container_name: text2image
    build: .
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8010:8010"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_VISIBLE_DEVICES=all
      - LOCAL_MODEL=black-forest-labs/FLUX.1-schnell
      - LOCAL_MODELS=flux-schnell
      - API_KEY=${API_KEY}
      - CLOUD_API_BASE_URL=${CLOUD_API_BASE_URL}
      - CLOUD_MODELS=${CLOUD_MODELS}
      - VALID_SIZES=${VALID_SIZES}
      - FLUX_DEFAULT_STEPS=${FLUX_DEFAULT_STEPS}
      - FLUX_DEFAULT_GUIDANCE=${FLUX_DEFAULT_GUIDANCE}
    volumes:
      - hf_cache:/root/.cache/huggingface 

volumes:
  hf_cache: 
